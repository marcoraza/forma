<!DOCTYPE html>
<html lang="en" data-theme="shark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forma — Audio Solutions</title>
<meta name="description" content="Sound design and sonic strategy for brands that move people.">
<meta property="og:title" content="Forma — Audio Solutions">
<meta property="og:description" content="Sound design and sonic strategy for brands that move people.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  [data-theme="original"] {
    --bg:#0c0c0e; --bg-alt:#0e0e10;
    --surface:#141414; --surface-light:#1a1a1a;
    --border:#1e1e1e; --border-mid:#252525;
    --text:#f0eee8; --text-dim:#8a8a8a; --text-muted:#6b6b6b; --text-ghost:#3a3a3a;
    --accent:#8b7355; --accent-dim:rgba(139,115,85,0.15);
    --ar:139; --ag:115; --ab:85;
  }
  [data-theme="shark"] {
    --bg:#28282D; --bg-alt:#2E2E33;
    --surface:#323237; --surface-light:#3A3A40;
    --border:#3A3A40; --border-mid:#48484E;
    --text:#CDD2D7; --text-dim:#9DA4AA; --text-muted:#6A7078; --text-ghost:#404046;
    --accent:#E6FF50; --accent-dim:rgba(230,255,80,0.12);
    --ar:230; --ag:255; --ab:80;
  }
  [data-theme="light"] {
    --bg:#FFFFFF; --bg-alt:#F8F8F6;
    --surface:#EAEAE7; --surface-light:#E2E2DF;
    --border:#D8D8D4; --border-mid:#CCCCC8;
    --text:#1A1A1F; --text-dim:#55555A; --text-muted:#7A7A80; --text-ghost:#C0C0BC;
    --accent:#8b7355; --accent-dim:rgba(139,115,85,0.10);
    --ar:139; --ag:115; --ab:85;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s, color 0.5s;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* UI */
  .ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(18px, 3.5vw, 48px) clamp(18px, 4vw, 60px);
    pointer-events: none;
  }
  .ui > * { pointer-events: auto; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.2s forwards;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-label {
    font-family: 'Space Mono', monospace;
    font-size: clamp(8px, 1.1vw, 10px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    transition: color 0.5s;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .theme-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.5s;
  }

  .theme-toggle button {
    padding: 6px 10px;
    font-size: 8px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    background: none;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }

  .theme-toggle button.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }

  .pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
    transition: background 0.5s;
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.5s forwards;
  }

  .bottom-bar span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-ghost);
    letter-spacing: 0.1em;
    transition: color 0.5s;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: min(92vw, 480px);
    max-height: 92vh;
    overflow-y: auto;
    padding: clamp(20px, 4vw, 36px);
    transform: translateY(16px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), background 0.5s, border-color 0.5s;
  }

  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .modal-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

  .modal-close {
    background: none; border: none;
    color: var(--text-muted); font-size: 18px;
    cursor: pointer; padding: 2px 6px; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }

  .fg label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    transition: color 0.5s;
  }

  .fg input, .fg textarea, .fg select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.5s, color 0.5s;
    resize: vertical;
    -webkit-appearance: none;
  }

  .fg select { cursor: pointer; }
  .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--accent); }
  .fg input::placeholder, .fg textarea::placeholder { color: var(--text-ghost); }
  .fg textarea { min-height: 72px; }

  .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .submit-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 3px;
    padding: 12px; cursor: pointer;
    font-weight: 700; width: 100%; margin-top: 4px;
    transition: opacity 0.2s, transform 0.1s, background 0.5s, color 0.5s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }

  .form-note { font-size: 11px; color: var(--accent); margin-top: 8px; min-height: 16px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  @media (max-width: 600px) {
    .fr { grid-template-columns: 1fr; }
    .bottom-bar span:first-child { display: none; }
    .theme-toggle button { padding: 5px 7px; font-size: 7px; }
    .pill span:last-child { font-size: 8px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="top-bar">
    <div class="logo-group">
      <svg viewBox="0 0 300 180" width="30" height="18">
        <polygon points="0,0 300,0 253,87 0,87" fill="var(--accent)"/>
        <polygon points="0,93 253,93 300,180 0,180" fill="var(--accent)"/>
      </svg>
      <span class="logo-label">Forma Audio Solutions</span>
    </div>
    <div class="top-right">
      <div class="theme-toggle">
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('original')">Dark</button>
        <button class="active" onclick="setTheme('shark')">Shark</button>
      </div>
      <button class="pill" onclick="openModal()">
        <span class="dot"></span>
        <span>Get in touch</span>
      </button>
    </div>
  </div>

  <div></div>

  <div class="bottom-bar">
    <span>Sound Design &amp; Sonic Strategy</span>
    <span>&copy; 2026</span>
  </div>
</div>

<!-- Contact modal -->
<div class="modal-backdrop" id="mb" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">New project</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-desc">Tell us about the sonic world your brand needs. We'll get back within 48h.</div>
    <form id="cf" onsubmit="handleSubmit(event)">
      <div class="fr">
        <div class="fg">
          <label>Your name</label>
          <input type="text" name="name" placeholder="Name" required>
        </div>
        <div class="fg">
          <label>Company</label>
          <input type="text" name="company" placeholder="Company name">
        </div>
      </div>
      <div class="fg">
        <label>Work email</label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="fg">
        <label>What do you need?</label>
        <select name="service">
          <option value="">Select a service</option>
          <option value="sound-design">Sound Design for Film / Campaign</option>
          <option value="sonic-branding">Sonic Branding / Audio Identity</option>
          <option value="music-production">Music Production / Composition</option>
          <option value="spatial-audio">Spatial Audio / Immersive</option>
          <option value="sonic-strategy">Sonic Strategy / Consulting</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="fg">
        <label>Project brief</label>
        <textarea name="brief" placeholder="What's the project? Timeline, scope, references..."></textarea>
      </div>
      <div class="fr">
        <div class="fg">
          <label>Budget range</label>
          <select name="budget">
            <option value="">Prefer not to say</option>
            <option value="<5k">Under $5,000</option>
            <option value="5-15k">$5,000 — $15,000</option>
            <option value="15-50k">$15,000 — $50,000</option>
            <option value="50k+">$50,000+</option>
          </select>
        </div>
        <div class="fg">
          <label>Timeline</label>
          <select name="timeline">
            <option value="">No rush</option>
            <option value="asap">ASAP</option>
            <option value="1-2w">1–2 weeks</option>
            <option value="1m">~1 month</option>
            <option value="3m+">3+ months</option>
          </select>
        </div>
      </div>
      <button type="submit" class="submit-btn">Send inquiry</button>
      <div class="form-note" id="fn"></div>
    </form>
  </div>
</div>

<script>
// ====== THEME ======
let AR=230, AG=255, AB=80;

function getColors() {
  const s = getComputedStyle(document.documentElement);
  AR = parseInt(s.getPropertyValue('--ar'));
  AG = parseInt(s.getPropertyValue('--ag'));
  AB = parseInt(s.getPropertyValue('--ab'));
}

function setTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
  const map = { light:'Light', original:'Dark', shark:'Shark' };
  document.querySelectorAll('.theme-toggle button').forEach(b => {
    if (b.textContent === map[name]) b.classList.add('active');
  });
  setTimeout(getColors, 60);
}

// ====== MODAL ======
function openModal() { document.getElementById('mb').classList.add('open'); }
function closeModal() { document.getElementById('mb').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function handleSubmit(e) {
  e.preventDefault();
  const f = e.target;
  const subj = encodeURIComponent(`Project inquiry from ${f.name.value}${f.company.value ? ' @ '+f.company.value : ''}`);
  const body = encodeURIComponent(
    `Name: ${f.name.value}\nCompany: ${f.company.value||'—'}\nEmail: ${f.email.value}\nService: ${f.service.value||'—'}\nBudget: ${f.budget.value||'—'}\nTimeline: ${f.timeline.value||'—'}\n\nBrief:\n${f.brief.value||'—'}`
  );
  window.location.href = `mailto:hello@formasound.co?subject=${subj}&body=${body}`;
  document.getElementById('fn').textContent = 'Opening your email client...';
}

// ====== CANVAS: SOUND TERRAIN ======
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;
let mx = -9999, my = -9999, mActive = false;
let mVx = 0, mVy = 0, prevMx = -9999, prevMy = -9999;
let mSpeed = 0;

// Imprints: traces the mouse leaves behind, each with unique behavior
const imprints = [];
const MAX_IMPRINTS = 40;
let imprintTimer = 0;

// Effect types for variety
const EFFECTS = ['ripple', 'vortex', 'fracture', 'gravity', 'static'];

function spawnImprint(x, y, speed) {
  const type = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
  imprints.push({
    x, y, type,
    birth: t,
    life: 1,
    decay: 0.003 + Math.random() * 0.004,
    radius: 120 + Math.random() * 140,
    strength: 15 + speed * 25 + Math.random() * 15,
    phase: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.06,
    freq: 8 + Math.random() * 30
  });
  if (imprints.length > MAX_IMPRINTS) imprints.shift();
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
}

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY; mActive = true;
  mVx = mx - prevMx; mVy = my - prevMy;
  mSpeed = Math.min(Math.sqrt(mVx * mVx + mVy * mVy) / 20, 1);
  prevMx = mx; prevMy = my;
});
document.addEventListener('mouseleave', () => { mActive = false; });
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY; mActive = true;
  mVx = mx - prevMx; mVy = my - prevMy;
  mSpeed = Math.min(Math.sqrt(mVx * mVx + mVy * mVy) / 20, 1);
  prevMx = mx; prevMy = my;
}, { passive: true });
document.addEventListener('touchend', () => { mActive = false; });

resize();
window.addEventListener('resize', resize);

const LINE_COUNT = 55;
const STEP = 3;

// Simple hash for pseudo-random per-point variation
function hash(a, b) {
  return Math.sin(a * 12.9898 + b * 78.233) * 43758.5453 % 1;
}

function calcImprint(imp, x, baseY, linePhase) {
  const dx = x - imp.x;
  const dy = baseY - imp.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > imp.radius) return 0;

  const norm = dist / imp.radius;
  const fade = (1 - norm);
  const age = t - imp.birth;
  const str = imp.strength * imp.life;

  switch (imp.type) {
    case 'ripple': {
      // Expanding concentric rings
      const ring = Math.sin(dist * 0.08 - age * 8 + imp.phase) * fade * str * 0.7;
      return ring;
    }
    case 'vortex': {
      // Swirling displacement
      const angle = Math.atan2(dy, dx) + age * imp.spin * 20;
      const swirl = Math.sin(angle * 3 + dist * 0.05) * fade * fade * str;
      return swirl;
    }
    case 'fracture': {
      // Sharp, jagged distortion
      const jagged = Math.sin(x * imp.freq * 0.01 + imp.phase) *
                     Math.sin(baseY * 0.03 + imp.phase * 2);
      return jagged * fade * fade * str * 1.2;
    }
    case 'gravity': {
      // Pull toward center, warps space
      const pull = (dy > 0 ? 1 : -1) * fade * fade * fade * str * 1.5;
      const wobble = Math.sin(age * 6 + dist * 0.04 + linePhase) * fade * str * 0.3;
      return pull + wobble;
    }
    case 'static': {
      // Noise burst, TV static feel
      const n = hash(Math.floor(x * 0.15), Math.floor(baseY * 0.15) + age * 100);
      return (n - 0.5) * fade * str * 1.8;
    }
    default: return 0;
  }
}

function animate() {
  t += 0.004;
  ctx.clearRect(0, 0, W, H);

  // Spawn imprints from mouse movement
  if (mActive) {
    imprintTimer += mSpeed * 0.4 + 0.02;
    if (imprintTimer > 1) {
      imprintTimer = 0;
      spawnImprint(mx, my, mSpeed);
    }
  }

  // Decay imprints
  for (let k = imprints.length - 1; k >= 0; k--) {
    imprints[k].life -= imprints[k].decay;
    if (imprints[k].life <= 0) imprints.splice(k, 1);
  }

  const lineGap = H / (LINE_COUNT + 1);

  for (let i = 0; i < LINE_COUNT; i++) {
    const baseY = lineGap * (i + 1);
    const linePhase = i * 0.18;
    const normalY = (i + 1) / (LINE_COUNT + 1);
    const centerDist = Math.abs(normalY - 0.5) * 2;
    const centerAmp = 1 - centerDist * centerDist;

    ctx.beginPath();

    let lineEnergy = 0;

    for (let x = 0; x <= W; x += STEP) {
      const nx = x / W;

      // Compound waveform
      const w1 = Math.sin(nx * 6 + t * 2.5 + linePhase) * 0.6;
      const w2 = Math.sin(nx * 14 + t * 1.8 - linePhase * 0.7) * 0.25;
      const w3 = Math.sin(nx * 3.5 - t * 1.2 + linePhase * 1.3) * 0.35;
      const w4 = Math.sin(nx * 22 + t * 3.2 + i * 0.4) * 0.1;
      const wave = w1 + w2 + w3 + w4;

      const baseAmp = (8 + centerAmp * 14) * (0.7 + 0.3 * Math.sin(t * 0.5 + i * 0.3));

      // Sum displacement from all active imprints
      let displacement = 0;
      for (let k = 0; k < imprints.length; k++) {
        displacement += calcImprint(imprints[k], x, baseY, linePhase);
      }

      // Live mouse: gentle real-time push (subtle, the imprints do the heavy lifting)
      let liveShift = 0;
      if (mActive) {
        const dx = x - mx;
        const dy = baseY - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 160) {
          const f = (1 - dist / 160);
          liveShift = (dy > 0 ? 1 : -1) * f * f * 12;
          lineEnergy = Math.max(lineEnergy, f);
        }
      }

      const y = baseY + wave * baseAmp + displacement + liveShift;

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // Opacity
    let alpha = 0.06 + centerAmp * 0.1;

    // Brighten from nearby imprints
    for (let k = 0; k < imprints.length; k++) {
      const dy = Math.abs(baseY - imprints[k].y);
      if (dy < imprints[k].radius) {
        alpha += (1 - dy / imprints[k].radius) * 0.15 * imprints[k].life;
      }
    }

    // Live mouse proximity brightness
    alpha += lineEnergy * 0.2;

    alpha = Math.min(alpha, 0.6);

    ctx.strokeStyle = `rgba(${AR},${AG},${AB},${alpha})`;
    ctx.lineWidth = 1 + centerAmp * 0.5;
    ctx.stroke();
  }

  // Glow per active imprint
  for (let k = 0; k < imprints.length; k++) {
    const imp = imprints[k];
    if (imp.life < 0.1) continue;
    const g = ctx.createRadialGradient(imp.x, imp.y, 0, imp.x, imp.y, imp.radius * 0.6);
    g.addColorStop(0, `rgba(${AR},${AG},${AB},${0.03 * imp.life})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(imp.x, imp.y, imp.radius * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Live cursor glow
  if (mActive) {
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, 140);
    g.addColorStop(0, `rgba(${AR},${AG},${AB},0.05)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mx, my, 140, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

getColors();
animate();
</script>
</body>
</html>
