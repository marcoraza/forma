<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA SOLUTIONS</title>
<meta name="description" content="FORMA AUDIO SOLUTIONS">
<meta name="application-name" content="FORMA AUDIO SOLUTIONS">
<meta name="apple-mobile-web-app-title" content="FORMA AUDIO SOLUTIONS">
<meta property="og:title" content="FORMA AUDIO SOLUTIONS">
<meta property="og:description" content="FORMA AUDIO SOLUTIONS">
<link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
<link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16.png">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/favicon/favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#28282D; --bg-alt:#2E2E33;
    --surface:#323237; --surface-light:#3A3A40;
    --border:#3A3A40; --border-mid:#48484E;
    --text:#CDD2D7; --text-dim:#9DA4AA; --text-muted:#6A7078; --text-ghost:#404046;
    --accent:#E6FF50; --accent-dim:rgba(230,255,80,0.12);
    --ar:230; --ag:255; --ab:80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s, color 0.5s;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* UI */
  .ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(18px, 3.5vw, 48px) clamp(18px, 4vw, 60px);
    pointer-events: none;
  }
  .ui > * { pointer-events: auto; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.2s forwards;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-label {
    font-family: 'Space Mono', monospace;
    font-size: clamp(8px, 1.1vw, 10px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    transition: color 0.5s;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }

  .pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
    transition: background 0.5s;
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.5s forwards;
  }

  .bottom-bar span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-ghost);
    letter-spacing: 0.1em;
    transition: color 0.5s;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: min(92vw, 480px);
    max-height: 92vh;
    overflow-y: auto;
    padding: clamp(20px, 4vw, 36px);
    transform: translateY(16px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), background 0.5s, border-color 0.5s;
  }

  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .modal-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

  .modal-close {
    background: none; border: none;
    color: var(--text-muted); font-size: 18px;
    cursor: pointer; padding: 2px 6px; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }

  .fg label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    transition: color 0.5s;
  }

  .fg input, .fg textarea, .fg select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.5s, color 0.5s;
    resize: vertical;
    -webkit-appearance: none;
  }

  .fg select { cursor: pointer; }
  .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--accent); }
  .fg input::placeholder, .fg textarea::placeholder { color: var(--text-ghost); }
  .fg textarea { min-height: 72px; }

  .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .submit-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 3px;
    padding: 12px; cursor: pointer;
    font-weight: 700; width: 100%; margin-top: 4px;
    transition: opacity 0.2s, transform 0.1s, background 0.5s, color 0.5s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }

  .form-note { font-size: 11px; color: var(--accent); margin-top: 8px; min-height: 16px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  @media (max-width: 600px) {
    .fr { grid-template-columns: 1fr; }
    .bottom-bar span:first-child { display: none; }
    .pill span:last-child { font-size: 8px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="top-bar">
    <div class="logo-group">
      <svg viewBox="0 0 300 180" width="30" height="18">
        <polygon points="0,0 300,0 253,87 0,87" fill="var(--accent)"/>
        <polygon points="0,93 253,93 300,180 0,180" fill="var(--accent)"/>
      </svg>
      <span class="logo-label">Forma Solutions</span>
    </div>
    <div class="top-right">
      <button class="pill" onclick="openModal()">
        <span class="dot"></span>
        <span>Get in touch</span>
      </button>
    </div>
  </div>

  <div></div>

  <div class="bottom-bar">
    <span>Sound Design &amp; Sonic Strategy</span>
    <span>&copy; 2026</span>
  </div>
</div>

<!-- Contact modal -->
<div class="modal-backdrop" id="mb" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">New project</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-desc">Tell us about the sonic world your brand needs. We'll get back within 48h.</div>
    <form id="cf" onsubmit="handleSubmit(event)">
      <div class="fr">
        <div class="fg">
          <label>Your name</label>
          <input type="text" name="name" placeholder="Name" required>
        </div>
        <div class="fg">
          <label>Company</label>
          <input type="text" name="company" placeholder="Company name">
        </div>
      </div>
      <div class="fg">
        <label>Work email</label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="fg">
        <label>What do you need?</label>
        <select name="service">
          <option value="">Select a service</option>
          <option value="sound-design">Sound Design for Film / Campaign</option>
          <option value="sonic-branding">Sonic Branding / Audio Identity</option>
          <option value="music-production">Music Production / Composition</option>
          <option value="spatial-audio">Spatial Audio / Immersive</option>
          <option value="sonic-strategy">Sonic Strategy / Consulting</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="fg">
        <label>Project brief</label>
        <textarea name="brief" placeholder="What's the project? Timeline, scope, references..."></textarea>
      </div>
      <div class="fr">
        <div class="fg">
          <label>Budget range</label>
          <select name="budget">
            <option value="">Prefer not to say</option>
            <option value="<5k">Under $5,000</option>
            <option value="5-15k">$5,000 — $15,000</option>
            <option value="15-50k">$15,000 — $50,000</option>
            <option value="50k+">$50,000+</option>
          </select>
        </div>
        <div class="fg">
          <label>Timeline</label>
          <select name="timeline">
            <option value="">No rush</option>
            <option value="asap">ASAP</option>
            <option value="1-2w">1–2 weeks</option>
            <option value="1m">~1 month</option>
            <option value="3m+">3+ months</option>
          </select>
        </div>
      </div>
      <button type="submit" class="submit-btn">Send inquiry</button>
      <div class="form-note" id="fn"></div>
    </form>
  </div>
</div>

<script>
// ====== THEME ======
let AR=230, AG=255, AB=80;

function getColors() {
  const s = getComputedStyle(document.documentElement);
  AR = parseInt(s.getPropertyValue('--ar'));
  AG = parseInt(s.getPropertyValue('--ag'));
  AB = parseInt(s.getPropertyValue('--ab'));
}

// ====== MODAL ======
function openModal() { document.getElementById('mb').classList.add('open'); }
function closeModal() { document.getElementById('mb').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function handleSubmit(e) {
  e.preventDefault();
  const f = e.target;
  const subj = encodeURIComponent(`Project inquiry from ${f.name.value}${f.company.value ? ' @ '+f.company.value : ''}`);
  const body = encodeURIComponent(
    `Name: ${f.name.value}\nCompany: ${f.company.value||'—'}\nEmail: ${f.email.value}\nService: ${f.service.value||'—'}\nBudget: ${f.budget.value||'—'}\nTimeline: ${f.timeline.value||'—'}\n\nBrief:\n${f.brief.value||'—'}`
  );
  window.location.href = `mailto:hello@formasound.co?subject=${subj}&body=${body}`;
  document.getElementById('fn').textContent = 'Opening your email client...';
}

// ====== CANVAS: SOUND TERRAIN ======
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;
let mx = -9999, my = -9999, mActive = false;
let mVx = 0, mVy = 0, prevMx = -9999, prevMy = -9999;
let mSpeed = 0;
const FORM_KEYS = ['rounded', 'square', 'triangle', 'saw'];
const formBlend = { rounded: 1, square: 0, triangle: 0, saw: 0 };
const formTarget = { rounded: 1, square: 0, triangle: 0, saw: 0 };

// Motion tuning keeps the field reactive without tearing the lines apart.
const MOTION = {
  timeStep: 0.0028,
  spawnRate: { base: 0.014, velocity: 0.26 },
  liveRadius: 290,
  liveShift: 18,
  tangleAmount: 5.8,
  phaseWarp: 0.95,
  sculptClamp: 22,
  lateralSpread: 0.28,
  tailStrength: 0.12,
  baseAmp: { min: 4.8, maxBoost: 9.5 },
  lineLift: { alpha: 0.18 },
  imprint: {
    max: 28,
    decayMin: 0.0021,
    decayRange: 0.0018,
    radiusMin: 170,
    radiusRange: 140,
    strengthBase: 7,
    strengthVelocity: 15,
    strengthRange: 6,
    spinRange: 0.024,
    freqMin: 7,
    freqRange: 14
  }
};

// Imprints: traces the mouse leaves behind, each with unique behavior
const imprints = [];
let imprintTimer = 0;

// Keep only the smoother effects so the field feels fluid instead of jagged.
const EFFECTS = ['ripple', 'vortex', 'gravity'];

function spawnImprint(x, y, speed) {
  const type = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
  imprints.push({
    x, y, type,
    birth: t,
    life: 1,
    decay: MOTION.imprint.decayMin + Math.random() * MOTION.imprint.decayRange,
    radius: MOTION.imprint.radiusMin + Math.random() * MOTION.imprint.radiusRange,
    strength: MOTION.imprint.strengthBase + speed * MOTION.imprint.strengthVelocity + Math.random() * MOTION.imprint.strengthRange,
    phase: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * MOTION.imprint.spinRange,
    freq: MOTION.imprint.freqMin + Math.random() * MOTION.imprint.freqRange
  });
  if (imprints.length > MOTION.imprint.max) imprints.shift();
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
}

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY; mActive = true;
  mVx = mx - prevMx; mVy = my - prevMy;
  mSpeed = Math.min(Math.sqrt(mVx * mVx + mVy * mVy) / 30, 1);
  prevMx = mx; prevMy = my;
});
document.addEventListener('mouseleave', () => { mActive = false; });
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY; mActive = true;
  mVx = mx - prevMx; mVy = my - prevMy;
  mSpeed = Math.min(Math.sqrt(mVx * mVx + mVy * mVy) / 30, 1);
  prevMx = mx; prevMy = my;
}, { passive: true });
document.addEventListener('touchend', () => { mActive = false; });

resize();
window.addEventListener('resize', resize);

const LINE_COUNT = 55;
const STEP = 3;

function calcImprint(imp, x, baseY, linePhase) {
  const dx = x - imp.x;
  const dy = baseY - imp.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > imp.radius) return 0;

  const norm = dist / imp.radius;
  const fade = (1 - norm);
  const age = t - imp.birth;
  const str = imp.strength * imp.life;

  switch (imp.type) {
    case 'ripple': {
      const ring = Math.sin(dist * 0.055 - age * 6.5 + imp.phase) * fade * str * 0.42;
      return ring;
    }
    case 'vortex': {
      const angle = Math.atan2(dy, dx) + age * imp.spin * 18;
      const swirl = Math.sin(angle * 2.4 + dist * 0.03) * fade * fade * str * 0.7;
      return swirl;
    }
    case 'gravity': {
      const pull = (dy > 0 ? 1 : -1) * fade * fade * fade * str * 0.8;
      const wobble = Math.sin(age * 4.6 + dist * 0.028 + linePhase) * fade * str * 0.16;
      return pull + wobble;
    }
    default: return 0;
  }
}

function getLineProfile(i) {
  return {
    slowFreq: 4.5 + Math.sin(i * 0.17) * 0.9,
    slowWeight: 0.42 + Math.cos(i * 0.11) * 0.08,
    midFreq: 8.8 + Math.cos(i * 0.29 + 0.6) * 1.8,
    midWeight: 0.22 + Math.sin(i * 0.23 + 1.4) * 0.07,
    detailFreq: 12.5 + Math.sin(i * 0.41 + 0.8) * 2.2,
    detailWeight: 0.045 + (0.5 + 0.5 * Math.cos(i * 0.37)) * 0.05,
    drift: i * 0.16 + Math.sin(i * 0.09) * 0.35,
    tilt: Math.sin(i * 0.13 + 0.4) * 0.22
  };
}

function smoothstep01(v) {
  const x = Math.max(0, Math.min(1, v));
  return x * x * (3 - 2 * x);
}

function triangleWave(phase) {
  return (2 / Math.PI) * Math.asin(Math.sin(phase));
}

function squareWave(phase) {
  return Math.tanh(Math.sin(phase) * 4.2);
}

function sawWave(phase) {
  const turn = phase / (Math.PI * 2);
  return 2 * (turn - Math.floor(turn + 0.5));
}

function getGestureState() {
  const velocityLen = Math.hypot(mVx, mVy);
  const safeLen = Math.max(1, velocityLen);
  const dirX = mActive ? mVx / safeLen : 0;
  const dirY = mActive ? mVy / safeLen : 0;
  const horiz = Math.abs(dirX);
  const vert = Math.abs(dirY);
  const diag = 1 - Math.abs(horiz - vert);
  const speed = smoothstep01(mSpeed);
  const difference = horiz - vert;
  let dominantForm = 'rounded';
  let secondaryForm = 'rounded';

  if (speed < 0.14) {
    dominantForm = 'rounded';
    secondaryForm = diag > 0.55 ? 'saw' : (horiz > vert ? 'square' : 'triangle');
  } else if (difference > 0.18) {
    dominantForm = 'square';
    secondaryForm = diag > 0.45 ? 'saw' : 'rounded';
  } else if (difference < -0.18) {
    dominantForm = 'triangle';
    secondaryForm = diag > 0.45 ? 'saw' : 'rounded';
  } else {
    dominantForm = 'saw';
    secondaryForm = horiz > vert ? 'square' : 'triangle';
  }

  for (const key of FORM_KEYS) formTarget[key] = 0;
  formTarget[dominantForm] = 0.8;
  formTarget[secondaryForm] += 0.2;

  return {
    dirX,
    dirY,
    speed,
    dominantForm,
    secondaryForm,
    formAmp: 12 + speed * 16
  };
}

function sampleForm(kind, phaseA, phaseB) {
  switch (kind) {
    case 'square':
      return squareWave(phaseA) * 0.78 + squareWave(phaseB * 0.7) * 0.22;
    case 'triangle':
      return triangleWave(phaseA * 1.08) * 0.84 + triangleWave(phaseB * 0.62) * 0.16;
    case 'saw':
      return sawWave(phaseA * 0.92) * 0.72 + sawWave(phaseB * 0.8) * 0.28;
    case 'rounded':
    default:
      return Math.sin(phaseA) * 0.82 + Math.sin(phaseB) * 0.18;
  }
}

function calcGestureForm(x, baseY, wavePhase, gesture, depthEnergy) {
  if (!mActive || depthEnergy < 0.015) return 0;

  const dx = x - mx;
  const dy = baseY - my;
  const radius = MOTION.liveRadius;
  const fx = smoothstep01(1 - Math.abs(dx) / (radius * 1.08));
  const fy = smoothstep01(1 - Math.abs(dy) / (radius * 0.82));
  const env = fx * fy;
  if (env <= 0) return 0;

  const dirX = gesture.dirX || 1;
  const dirY = gesture.dirY || 0;
  const along = (dx * dirX + dy * dirY) / radius;
  const across = (-dx * dirY + dy * dirX) / radius;
  const phaseMain = across * Math.PI * (2.2 + gesture.speed * 1.7) + wavePhase * 0.95;
  const phaseAlt = along * Math.PI * (1.5 + gesture.speed * 1.35) - wavePhase * 0.38;
  const phaseDetail = (across * 1.25 + along * 0.52) * Math.PI * 1.95 + wavePhase * 0.22;
  const roundedShape =
    Math.sin(phaseMain) * 0.72 +
    Math.sin(phaseAlt * 0.82) * 0.18 +
    Math.sin(phaseDetail * 0.38) * 0.1;

  const squareTerrace =
    squareWave(phaseMain * 0.84) * 0.62 +
    squareWave(phaseDetail * 0.52) * 0.22 +
    sawWave(phaseAlt * 0.46) * 0.16;

  const triangleCrest =
    triangleWave(phaseMain * 1.08) * 0.7 +
    triangleWave(phaseAlt * 0.64) * 0.18 +
    Math.sign(Math.sin(phaseDetail * 0.42)) * 0.12;

  const sawRamp =
    sawWave(phaseMain * 0.9) * 0.56 +
    sawWave(phaseAlt * 1.16) * 0.24 +
    triangleWave(phaseDetail * 0.58) * 0.2;

  const mixed =
    roundedShape * formBlend.rounded +
    squareTerrace * formBlend.square +
    triangleCrest * formBlend.triangle +
    sawRamp * formBlend.saw;

  const envelope = Math.pow(env, 0.8) * (0.42 + env * 0.58);
  return mixed * depthEnergy * gesture.formAmp * envelope;
}

function calcDepthPush(x, baseY, cx, cy, radius, strength) {
  const dx = x - cx;
  const dy = baseY - cy;
  const ax = Math.abs(dx);
  const ay = Math.abs(dy);
  if (ax > radius || ay > radius * 0.95) {
    return { shift: 0, energy: 0, phase: 0, tangle: 0 };
  }

  const fx = smoothstep01(1 - ax / radius);
  const fy = smoothstep01(1 - ay / (radius * 0.95));
  const lateralFx = smoothstep01(1 - ax / (radius * (1 + MOTION.lateralSpread)));
  const influence = fx * fy;
  const spread = lateralFx * fy;
  const ridge = Math.pow(influence, 2.1);
  const shoulder = Math.pow(fx, 1.45) * Math.pow(fy, 1.18);
  const tail = Math.pow(spread, 1.6);
  const twist = Math.sin(dx * 0.03 + t * 5.2 + cy * 0.0015) * shoulder;
  const fold = Math.sin(dx * 0.065 - dy * 0.028 + t * 3.6) * ridge;
  const contour = Math.sin(dx * 0.018 + t * 2.8 + baseY * 0.003) * shoulder;
  const drift = Math.sin(dx * 0.012 - t * 1.9 + baseY * 0.0024) * tail;
  const gesture = getGestureState();
  const dirX = gesture.dirX;
  const dirY = gesture.dirY;
  const along = (dx * dirX + dy * dirY) / radius;
  const across = (-dx * dirY + dy * dirX) / radius;
  const motionBlend = 0.3 + gesture.speed * 0.7;
  const bloom = Math.cos(across * Math.PI * 0.9) * ridge;
  const saddle = Math.sin(across * Math.PI * 1.6 + t * 1.7) * shoulder * motionBlend;
  const wake = Math.sin(along * Math.PI * 1.2 - t * 1.5) * tail * (0.24 + motionBlend * 0.32);
  const pinch = Math.sin((across + along * 0.45) * Math.PI * 2.1 + t * 0.8) * ridge * (0.12 + motionBlend * 0.16);
  const sign = dy === 0 ? 1 : Math.sign(dy);
  const force = strength * (1 + mSpeed * 0.75);
  const energy = Math.max(ridge, shoulder * 0.9, tail * 0.7);
  const sculpt =
    sign * (ridge * force + shoulder * force * 0.42 + bloom * force * 0.1) +
    twist * force * 0.18 +
    fold * force * 0.1 +
    contour * force * 0.16 +
    saddle * force * 0.18 +
    pinch * force * 0.16 +
    sign * (drift + wake) * force * MOTION.tailStrength;

  return {
    shift: Math.tanh(sculpt / MOTION.sculptClamp) * MOTION.sculptClamp,
    energy,
    phase: (twist * 0.52 + fold * 0.3 + contour * 0.38 + saddle * 0.3 + wake * 0.22) * MOTION.phaseWarp,
    tangle: (twist * 0.62 + fold * 0.6 + contour * 0.38 + saddle * 0.72 + pinch * 0.6 + wake * 0.24) * MOTION.tangleAmount
  };
}

function animate() {
  t += MOTION.timeStep;
  ctx.clearRect(0, 0, W, H);
  const gesture = getGestureState();
  for (const key of FORM_KEYS) {
    formBlend[key] += (formTarget[key] - formBlend[key]) * 0.12;
  }

  // Spawn imprints from mouse movement
  if (mActive) {
    imprintTimer += mSpeed * MOTION.spawnRate.velocity + MOTION.spawnRate.base;
    if (imprintTimer > 1) {
      imprintTimer = 0;
      spawnImprint(mx, my, mSpeed);
    }
  }

  // Decay imprints
  for (let k = imprints.length - 1; k >= 0; k--) {
    imprints[k].life -= imprints[k].decay;
    if (imprints[k].life <= 0) imprints.splice(k, 1);
  }

  const lineGap = H / (LINE_COUNT + 1);

  for (let i = 0; i < LINE_COUNT; i++) {
    const baseY = lineGap * (i + 1);
    const linePhase = i * 0.18;
    const normalY = (i + 1) / (LINE_COUNT + 1);
    const centerDist = Math.abs(normalY - 0.5) * 2;
    const centerAmp = 1 - centerDist * centerDist;
    const profile = getLineProfile(i);

    ctx.beginPath();

    let lineEnergy = 0;

    for (let x = 0; x <= W; x += STEP) {
      const nx = x / W;
      let depthShift = 0;
      let depthPhase = 0;
      let depthTangle = 0;
      let gestureShift = 0;

      if (mActive) {
        const depth = calcDepthPush(x, baseY, mx, my, MOTION.liveRadius, MOTION.liveShift);
        depthShift = depth.shift;
        depthPhase = depth.phase;
        depthTangle = depth.tangle;
        lineEnergy = Math.max(lineEnergy, depth.energy);
        gestureShift = calcGestureForm(x, baseY, linePhase + profile.drift + depthPhase, gesture, depth.energy);
      }

      const wavePhase = linePhase + profile.drift + depthPhase;

      // Mixed wave families give each line a slightly different sonic personality.
      const w1 = Math.sin(nx * profile.slowFreq + t * 1.85 + wavePhase) * profile.slowWeight;
      const w2 = Math.sin(nx * profile.midFreq + t * 1.35 - wavePhase * 0.72) * profile.midWeight;
      const w3 = Math.sin(nx * 2.6 - t * 0.9 + wavePhase * 1.15 + profile.tilt) * 0.24;
      const w4 = Math.sin(nx * profile.detailFreq + t * 2.35 + i * 0.31 + depthTangle * 0.02) * profile.detailWeight;
      const wave = w1 + w2 + w3 + w4;

      const baseAmp =
        (MOTION.baseAmp.min + centerAmp * MOTION.baseAmp.maxBoost) *
        (0.78 + 0.22 * Math.sin(t * 0.35 + i * 0.24));

      // Sum displacement from all active imprints
      let displacement = 0;
      for (let k = 0; k < imprints.length; k++) {
        displacement += calcImprint(imprints[k], x, baseY, linePhase);
      }

      const braid = Math.sin(nx * 18 + wavePhase * 0.72 + depthTangle * 0.04) * depthTangle * 0.1;
      const shear = Math.sin(nx * 6.5 - t * 1.35 + profile.tilt * 2.4) * depthTangle * 0.045;

      const y = baseY + wave * baseAmp + displacement + depthShift + gestureShift + braid + shear;

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // Opacity
    let alpha = 0.06 + centerAmp * 0.1;

    // Brighten from nearby imprints
    for (let k = 0; k < imprints.length; k++) {
      const dy = Math.abs(baseY - imprints[k].y);
      if (dy < imprints[k].radius) {
        alpha += (1 - dy / imprints[k].radius) * 0.15 * imprints[k].life;
      }
    }

    // Live mouse proximity brightness
    alpha += lineEnergy * MOTION.lineLift.alpha;

    alpha = Math.min(alpha, 0.48);

    ctx.strokeStyle = `rgba(${AR},${AG},${AB},${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  requestAnimationFrame(animate);
}

getColors();
animate();
</script>
</body>
