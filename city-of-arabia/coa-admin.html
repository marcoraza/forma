<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forma — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#FFFFFF;--bg-alt:#F8F8F6;
    --surface:#EAEAE7;--surface-light:#E2E2DF;--surface-deep:#F0F0ED;
    --border:#D8D8D4;--border-mid:#CCCCC8;
    --text:#1A1A1F;--text-dim:#55555A;--text-muted:#7A7A80;--text-ghost:#C0C0BC;
    --gold:#8b7355;--gold-dim:rgba(139,115,85,.10);
  }

  body{background:var(--bg-alt);font-family:'Space Grotesk',sans-serif;color:var(--text);min-height:100vh}

  /* ===== LOGIN ===== */
  .login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);z-index:100}
  .login-wrap.hidden{display:none}
  .login-card{width:360px;max-width:90vw;text-align:center}
  .login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px}
  .login-logo span{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase}
  .login-field{position:relative;margin-bottom:24px}
  .login-input{width:100%;padding:12px 0;border:none;border-bottom:1px solid var(--border);background:none;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.15em;color:var(--text);outline:none;text-align:center;transition:border-color .2s}
  .login-input:focus{border-color:var(--gold)}
  .login-input::placeholder{color:var(--text-ghost);letter-spacing:.1em}
  .login-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:12px 40px;border:1px solid var(--gold);background:var(--gold);color:var(--bg);cursor:pointer;transition:opacity .2s}
  .login-btn:hover{opacity:.85}
  .login-error{font-size:11px;color:#b44;margin-top:12px;min-height:16px;font-weight:300}

  /* ===== SHELL ===== */
  .shell{display:none;max-width:1200px;margin:0 auto;padding:40px 32px 80px}
  .shell.active{display:block}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:0}
  .header-left{display:flex;align-items:center;gap:14px}
  .header-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase}
  .header-title{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:16px}
  .header-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted)}
  .btn-sm{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all .2s}
  .btn-ghost{border:1px solid var(--border-mid);background:none;color:var(--text-muted)}
  .btn-ghost:hover{border-color:var(--text-muted);color:var(--text)}
  .btn-gold{border:1px solid var(--gold);background:var(--gold);color:var(--bg)}
  .btn-gold:hover{opacity:.85}

  /* Tabs */
  .tabs{display:flex;gap:0;margin:24px 0;border-bottom:1px solid var(--border)}
  .tab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:12px 24px;border:none;background:none;color:var(--text-ghost);cursor:pointer;position:relative;transition:color .2s}
  .tab:hover{color:var(--text-muted)}
  .tab.active{color:var(--gold)}
  .tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold)}
  .tab-badge{font-size:9px;background:var(--gold-dim);color:var(--gold);padding:2px 6px;margin-left:8px;font-weight:700}

  /* Section */
  .section{display:none}
  .section.active{display:block}

  /* Filters */
  .filters{display:flex;gap:8px;margin:20px 0 24px;flex-wrap:wrap}
  .filter-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);background:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
  .filter-btn:hover{border-color:var(--text-muted);color:var(--text)}
  .filter-btn.active{border-color:var(--gold);background:var(--gold);color:var(--bg)}

  /* Table: Feedback */
  .table-wrap{width:100%;overflow-x:auto}
  .table-head{display:grid;gap:0;padding:0 16px 12px;border-bottom:1px solid var(--border)}
  .table-head span{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase}
  .table-head.feedback{grid-template-columns:140px 120px 1fr 1fr 1fr}
  .table-head.inquiry{grid-template-columns:120px 140px 160px 140px 1fr}
  .table-body{display:flex;flex-direction:column}
  .table-row{display:grid;gap:0;padding:16px;border-bottom:1px solid var(--surface);transition:background .15s}
  .table-row:hover{background:var(--surface-deep)}
  .table-row.feedback{grid-template-columns:140px 120px 1fr 1fr 1fr}
  .table-row.inquiry{grid-template-columns:120px 140px 160px 140px 1fr}
  .table-cell{font-size:13px;font-weight:300;color:var(--text-dim);padding-right:16px;line-height:1.45;overflow:hidden;text-overflow:ellipsis}
  .table-cell.date{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-ghost);letter-spacing:.04em}
  .table-cell.mood{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
  .table-cell.empty{color:var(--text-ghost);font-style:italic;font-size:11px}
  .table-cell.name{font-weight:500;color:var(--text)}
  .table-cell.service{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.06em}

  /* Inquiry detail expand */
  .inq-expand{display:none;grid-column:1/-1;padding:16px 0 0;border-top:1px solid var(--surface);margin-top:12px}
  .inq-expand.open{display:block}
  .inq-row{display:flex;gap:32px;margin-bottom:10px;flex-wrap:wrap}
  .inq-item{display:flex;flex-direction:column;gap:2px}
  .inq-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-ghost)}
  .inq-value{font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.5}
  .inq-brief{margin-top:4px;white-space:pre-wrap}

  /* Empty / Loading */
  .empty-state{text-align:center;padding:80px 20px}
  .empty-state-text{font-size:14px;color:var(--text-ghost);font-weight:300}
  .loading{text-align:center;padding:60px 20px}
  .loading-text{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .loading-text{animation:pulse 1.5s ease-in-out infinite}

  /* Mobile */
  @media(max-width:820px){
    .shell{padding:24px 16px 60px}
    .header{flex-direction:column;align-items:flex-start;gap:16px}
    .header-right{width:100%;justify-content:flex-end}
    .tabs{margin:16px 0}
    .tab{padding:10px 16px;font-size:9px}
    .table-head{display:none}
    .table-row{grid-template-columns:1fr;gap:8px;padding:16px 12px}
    .table-row.feedback::before{content:attr(data-mood);font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
    .table-row.inquiry::before{content:attr(data-name);font-weight:500;font-size:14px;color:var(--text)}
    .table-cell.date{order:-1}
    .table-cell.mood,.table-cell.name{display:none}
    .table-cell{padding-right:0}
    .table-cell::before{content:attr(data-label);display:block;font-family:'Space Mono',monospace;font-size:8px;color:var(--text-ghost);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
    .filters{gap:6px}
    .filter-btn{font-size:8px;padding:5px 10px}
    .inq-row{gap:16px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 300 180" width="36" height="22"><polygon points="0,0 300,0 253,87 0,87" fill="var(--gold)"/><polygon points="0,93 253,93 300,180 0,180" fill="var(--gold)"/></svg>
      <span>Admin</span>
    </div>
    <div class="login-field">
      <input class="login-input" id="pw-input" type="password" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <button class="login-btn" onclick="tryLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="shell" id="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <svg viewBox="0 0 300 180" width="32" height="19"><polygon points="0,0 300,0 253,87 0,87" fill="var(--gold)"/><polygon points="0,93 253,93 300,180 0,180" fill="var(--gold)"/></svg>
      <div>
        <div class="header-label">Forma</div>
        <div class="header-title">Admin</div>
      </div>
    </div>
    <div class="header-right">
      <span class="header-count" id="entry-count"></span>
      <button class="btn-sm btn-gold" onclick="loadData()">Refresh</button>
      <button class="btn-sm btn-ghost" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-feedback" onclick="switchTab('feedback')">Feedback<span class="tab-badge" id="badge-feedback">0</span></button>
    <button class="tab" id="tab-inquiries" onclick="switchTab('inquiries')">Inquiries<span class="tab-badge" id="badge-inquiries">0</span></button>
  </div>

  <!-- FEEDBACK SECTION -->
  <div class="section active" id="sec-feedback">
    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="filterBy('all',this)">All</button>
    </div>
    <div class="table-wrap">
      <div class="table-head feedback">
        <span>Date</span>
        <span>Mood</span>
        <span>Change 1</span>
        <span>Change 2</span>
        <span>Change 3</span>
      </div>
      <div class="table-body" id="fb-body">
        <div class="loading"><span class="loading-text">Loading...</span></div>
      </div>
    </div>
  </div>

  <!-- INQUIRIES SECTION -->
  <div class="section" id="sec-inquiries">
    <div class="table-wrap" style="margin-top:20px">
      <div class="table-head inquiry">
        <span>Date</span>
        <span>Name</span>
        <span>Email</span>
        <span>Service</span>
        <span>Brief</span>
      </div>
      <div class="table-body" id="inq-body">
        <div class="loading"><span class="loading-text">Loading...</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyL59q0C-Zzu1Vougkb3HAC6OLkj0FBN9gGE-AxxhIvNfqPphWuj6aTWDOqsVDqaRZa/exec';
const PW_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';

let _feedbacks = [];
let _inquiries = [];
let _filter = 'all';
let _activeTab = 'feedback';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem('coa-admin', '1');
    showDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Invalid password';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function showDashboard() {
  document.getElementById('login-wrap').classList.add('hidden');
  document.getElementById('shell').classList.add('active');
  loadData();
}

function logout() {
  sessionStorage.removeItem('coa-admin');
  document.getElementById('shell').classList.remove('active');
  document.getElementById('login-wrap').classList.remove('hidden');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').focus();
}

function switchTab(tab) {
  _activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  updateCount();
}

async function loadData() {
  document.getElementById('fb-body').innerHTML = '<div class="loading"><span class="loading-text">Loading...</span></div>';
  document.getElementById('inq-body').innerHTML = '<div class="loading"><span class="loading-text">Loading...</span></div>';

  try {
    const res = await fetch(SHEET_URL + '?action=list');
    const json = await res.json();
    const all = json.data || [];

    _feedbacks = all.filter(r => r.type !== 'inquiry');
    _inquiries = all.filter(r => r.type === 'inquiry');

    document.getElementById('badge-feedback').textContent = _feedbacks.length;
    document.getElementById('badge-inquiries').textContent = _inquiries.length;

    buildFilters();
    renderFeedback();
    renderInquiries();
    updateCount();
  } catch (err) {
    const msg = '<div class="empty-state"><div class="empty-state-text">Failed to load data.</div></div>';
    document.getElementById('fb-body').innerHTML = msg;
    document.getElementById('inq-body').innerHTML = msg;
  }
}

function updateCount() {
  const n = _activeTab === 'feedback'
    ? (_filter === 'all' ? _feedbacks.length : _feedbacks.filter(r => r.mood === _filter).length)
    : _inquiries.length;
  document.getElementById('entry-count').textContent = n + ' entr' + (n === 1 ? 'y' : 'ies');
}

function buildFilters() {
  const moods = [...new Set(_feedbacks.map(r => r.mood).filter(Boolean))].sort();
  const wrap = document.getElementById('filters');
  wrap.innerHTML = '<button class="filter-btn active" onclick="filterBy(\'all\',this)">All</button>';
  moods.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = m;
    btn.onclick = function() { filterBy(m, this); };
    wrap.appendChild(btn);
  });
}

function filterBy(mood, btn) {
  _filter = mood;
  document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeedback();
  updateCount();
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return dd + '/' + mm + ' ' + hh + ':' + min;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function renderFeedback() {
  const filtered = _filter === 'all' ? _feedbacks : _feedbacks.filter(r => r.mood === _filter);
  const body = document.getElementById('fb-body');

  if (!filtered.length) {
    body.innerHTML = '<div class="empty-state"><div class="empty-state-text">No feedback yet.</div></div>';
    return;
  }

  body.innerHTML = filtered.map(r => {
    const c1 = r.change_1 || '';
    const c2 = r.change_2 || '';
    const c3 = r.change_3 || '';
    return '<div class="table-row feedback" data-mood="' + esc(r.mood || '') + '">'
      + '<div class="table-cell date" data-label="Date">' + fmtDate(r.timestamp) + '</div>'
      + '<div class="table-cell mood">' + esc(r.mood || '') + '</div>'
      + '<div class="table-cell' + (c1 ? '' : ' empty') + '" data-label="Change 1">' + esc(c1 || 'empty') + '</div>'
      + '<div class="table-cell' + (c2 ? '' : ' empty') + '" data-label="Change 2">' + esc(c2 || 'empty') + '</div>'
      + '<div class="table-cell' + (c3 ? '' : ' empty') + '" data-label="Change 3">' + esc(c3 || 'empty') + '</div>'
      + '</div>';
  }).join('');
}

function toggleInquiry(id) {
  const el = document.getElementById('inq-' + id);
  el.classList.toggle('open');
}

function renderInquiries() {
  const body = document.getElementById('inq-body');

  if (!_inquiries.length) {
    body.innerHTML = '<div class="empty-state"><div class="empty-state-text">No inquiries yet.</div></div>';
    return;
  }

  body.innerHTML = _inquiries.map((r, i) => {
    const name = r.name || '';
    const company = r.company || '';
    const display = company ? name + ' @ ' + company : name;
    return '<div class="table-row inquiry" data-name="' + esc(display) + '" onclick="toggleInquiry(' + i + ')" style="cursor:pointer">'
      + '<div class="table-cell date" data-label="Date">' + fmtDate(r.timestamp) + '</div>'
      + '<div class="table-cell name" data-label="Name">' + esc(display) + '</div>'
      + '<div class="table-cell" data-label="Email" style="font-size:12px">' + esc(r.email || '') + '</div>'
      + '<div class="table-cell service" data-label="Service">' + esc(r.service || '') + '</div>'
      + '<div class="table-cell" data-label="Brief" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.brief || '') + '</div>'
      + '<div class="inq-expand" id="inq-' + i + '">'
        + '<div class="inq-row">'
          + '<div class="inq-item"><span class="inq-label">Company</span><span class="inq-value">' + esc(company || '-') + '</span></div>'
          + '<div class="inq-item"><span class="inq-label">Budget</span><span class="inq-value">' + esc(r.budget || '-') + '</span></div>'
          + '<div class="inq-item"><span class="inq-label">Timeline</span><span class="inq-value">' + esc(r.timeline || '-') + '</span></div>'
        + '</div>'
        + '<div class="inq-item"><span class="inq-label">Full brief</span><span class="inq-value inq-brief">' + esc(r.brief || '-') + '</span></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

if (sessionStorage.getItem('coa-admin') === '1') {
  showDashboard();
}
</script>
</body>
</html>
